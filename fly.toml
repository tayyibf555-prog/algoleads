# fly.toml — Algo by Excelsior admin portal
#
# Persistent SQLite via a 1 GB Fly volume mounted at /app/db.
# Auto-stops when idle (free tier) and auto-starts on first
# request. London region for lowest latency to UK clients.

app = "algo-admin-portal"
primary_region = "lhr"

[build]

[env]
  PORT = "4002"
  ALLOWED_ORIGINS = "*"   # tighten via `fly secrets` after marketing site is live
  LEAD_RETENTION_DAYS = "0"

[http_service]
  internal_port = 4002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "algo_admin_data"
  destination = "/app/db"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = "immediate"
